name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8 (non-blocking)
        run: |
          pip install flake8
          flake8 src/ --max-line-length=120 --exit-zero

      - name: Generate sample dataset
        run: python data/generate_sample_data.py --n 1500 --out data/raw/telco_churn.csv

      - name: Run unit & integration tests
        run: pytest tests/ -v --cov=src --cov-report=term-missing

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t churn-prediction:ci .
